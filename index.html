<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GPS Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>
  <h1>GPS Tracker Realtime</h1>
  <div id="map"></div>

  <div id="controls">
    <div id="mainControls">
      <button id="startTracking">Mulai Tracking</button>
      <button id="resetTracking">Reset Tracking</button>
    </div>
    <div id="subControls" style="display: none;">
      <button id="clickPoint">Klik</button>
      <button id="stopTracking">Selesai</button>
      <button id="back">Kembali</button>
    </div>
    <p id="pointCount" style="display: none;"></p>
  </div>

  <footer>
    <p>GPS Tracker | Real-Time Tracking App</p>
    <p>Created by Dana Widianta | <a href="danawidianta899@gmail.com">Email me</a></p>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDu9Uusc_Xf_WQEDDSQ94ZRI59xV3GiHYw",
      authDomain: "gps-tracker-57ca4.firebaseapp.com",
      databaseURL: "https://gps-tracker-57ca4-default-rtdb.firebaseio.com",
      projectId: "gps-tracker-57ca4",
      storageBucket: "gps-tracker-57ca4.appspot.com",
      messagingSenderId: "",
      appId: ""
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const pathCoordinates = [];
    const markers = [];
    const polyline = L.polyline([], { color: 'red' }).addTo(map);

    let allData = [];
    let clickedPoints = [];

    db.ref('sensor').once('value').then(snapshot => {
      const data = snapshot.val();
      if (!data) return;
      const sortedKeys = Object.keys(data).sort();
      allData = sortedKeys.map(key => data[key]);
    });

    document.getElementById('startTracking').onclick = () => {
      document.getElementById('subControls').style.display = 'flex';
      document.getElementById('mainControls').style.display = 'none';
      document.getElementById('pointCount').style.display = 'none';
    };

    document.getElementById('clickPoint').onclick = () => {
      if (clickedPoints.length < allData.length) {
        const point = allData[clickedPoints.length];
        const lat = parseFloat(point.latitude);
        const lng = parseFloat(point.longitude);
        if (!isNaN(lat) && !isNaN(lng)) {
          const marker = L.marker([lat, lng]).addTo(map);
          markers.push(marker);
          pathCoordinates.push([lat, lng]);
          clickedPoints.push(point);

          polyline.setLatLngs(pathCoordinates);

          marker.bindPopup(`
            <div class="popup-content">
              <h3>Data Sensor</h3>
              <ul>
                <li><strong>Suhu:</strong> ${point.suhu} °C</li>
                <li><strong>Kelembaban:</strong> ${point.kelembaban} %</li>
                <li><strong>Gyro X:</strong> ${point.gyro_x}</li>
                <li><strong>Gyro Y:</strong> ${point.gyro_y}</li>
                <li><strong>Gyro Z:</strong> ${point.gyro_z}</li>
                <li><strong>Latitude:</strong> ${point.latitude}</li>
                <li><strong>Longitude:</strong> ${point.longitude}</li>
              </ul>
            </div>
          `);

          map.setView([lat, lng], 18);
        }
      }
    };

    document.getElementById('stopTracking').onclick = () => {
      document.getElementById('pointCount').style.display = 'block';
      document.getElementById('pointCount').innerText = `Jumlah titik yang ditandai: ${clickedPoints.length}`;
    };

    document.getElementById('back').onclick = () => {
      document.getElementById('subControls').style.display = 'none';
      document.getElementById('mainControls').style.display = 'flex';
    };

    document.getElementById('resetTracking').onclick = () => {
      clickedPoints = [];
      pathCoordinates.length = 0;
      polyline.setLatLngs([]);
      markers.forEach(m => map.removeLayer(m));
      markers.length = 0;
      document.getElementById('subControls').style.display = 'none';
      document.getElementById('mainControls').style.display = 'flex';
      document.getElementById('pointCount').style.display = 'none';
    };
  </script>
</body>
</html>
