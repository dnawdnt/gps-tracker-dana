<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GPS Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>
  <h1>GPS Tracker Realtime</h1>
  <div id="map"></div>

  <footer>
    <p>GPS Tracker | Real-Time Tracking App</p>
    <p>Created by Dana Widianta | <a href="mailto:danawidianta899@gmail.com">Email me</a></p>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDu9Uusc_Xf_WQEDDSQ94ZRI59xV3GiHYw",
      authDomain: "gps-tracker-57ca4.firebaseapp.com",
      databaseURL: "https://gps-tracker-57ca4-default-rtdb.firebaseio.com",
      projectId: "gps-tracker-57ca4",
      storageBucket: "gps-tracker-57ca4.appspot.com",
      messagingSenderId: "",
      appId: ""
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const coordinates = [];
    const polyline = L.polyline([], { color: 'red' }).addTo(map);

    db.ref('sensor').once('value').then(snapshot => {
      const data = snapshot.val();
      if (!data) return;

      const allPoints = Object.values(data); // urut berdasarkan input
      allPoints.forEach(point => {
        const lat = parseFloat(point.latitude);
        const lng = parseFloat(point.longitude);

        if (!isNaN(lat) && !isNaN(lng)) {
          coordinates.push([lat, lng]);

          const marker = L.marker([lat, lng]).addTo(map);
          marker.bindPopup(`
            <div class="popup-content">
              <h3>Data Sensor</h3>
              <ul>
                <li><strong>Suhu:</strong> ${point.suhu} °C</li>
                <li><strong>Kelembaban:</strong> ${point.kelembaban} %</li>
                <li><strong>Gyro X:</strong> ${point.gyro_x}</li>
                <li><strong>Gyro Y:</strong> ${point.gyro_y}</li>
                <li><strong>Gyro Z:</strong> ${point.gyro_z}</li>
                <li><strong>Latitude:</strong> ${lat}</li>
                <li><strong>Longitude:</strong> ${lng}</li>
              </ul>
            </div>
          `);
        }
      });

      polyline.setLatLngs(coordinates);
      if (coordinates.length > 0) {
        map.fitBounds(polyline.getBounds());
      }
    });
  </script>
</body>
</html>
